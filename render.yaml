  #       value: temporal
  #     - key: POSTGRES_PASSWORD
  #       generateValue: true
  #     - key: POSTGRES_DB
  #       value: temporal
  #   disk:
  #     name: temporal-data
  #     mountPath: /var/lib/postgresql/data
  #     sizeGB: 10
  #
  # - type: pserv
  #   name: temporal-elasticsearch
  #   runtime: docker
  #   image:
  #     url: elasticsearch:7.17.27
  #   envVars:
  #     - key: discovery.type
  #       value: single-node
  #     - key: ES_JAVA_OPTS
  #       value: '-Xms256m -Xmx256m'
  #     - key: xpack.security.enabled
  #       value: 'false'
  #     - key: cluster.routing.allocation.disk.threshold_enabled
  #       value: 'true'
  #     - key: cluster.routing.allocation.disk.watermark.low
  #       value: 512mb
  #     - key: cluster.routing.allocation.disk.watermark.high
  #       value: 256mb
  #     - key: cluster.routing.allocation.disk.watermark.flood_stage
  #       value: 128mb
