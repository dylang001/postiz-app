# Postiz Deployment Blueprint for Render
# Docs: https://docs.render.com/blueprint-spec
#
# BEFORE DEPLOYING:
# 1. Create a free Temporal Cloud account at https://temporal.io/cloud
#    (free tier: 10K actions/month, 50 concurrent workflows)
# 2. Add the Temporal address as an environment variable in the Render dashboard
#    or uncomment and fill in the TEMPORAL_ADDRESS below.
# 3. Set MAIN_URL / FRONTEND_URL / NEXT_PUBLIC_BACKEND_URL to your Render domain.

services:
  # Main Postiz Web Application (bundled frontend + backend)
  # Uses the official Postiz Docker image
  - type: web
    name: postiz-app
    runtime: docker
    image:
      url: ghcr.io/gitroomhq/postiz-app:latest
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: postiz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: postiz-redis
          property: connectionString
      - key: MAIN_URL
        sync: false  # Set to your Render domain, e.g. https://postiz-app.onrender.com
      - key: FRONTEND_URL
        sync: false  # Same as MAIN_URL
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false  # e.g. https://postiz-app.onrender.com/api
      - key: BACKEND_INTERNAL_URL
        value: http://localhost:3000
      - key: JWT_SECRET
        generateValue: true
      - key: TEMPORAL_ADDRESS
        sync: false  # Required: your Temporal Cloud endpoint or self-hosted Temporal address
      - key: IS_GENERAL
        value: 'true'
      - key: STORAGE_PROVIDER
        value: local
      - key: UPLOAD_DIRECTORY
        value: /uploads
      - key: NEXT_PUBLIC_UPLOAD_DIRECTORY
        value: /uploads
      - key: DISABLE_REGISTRATION
        value: 'false'
      - key: API_LIMIT
        value: '30'
      - key: FEE_AMOUNT
        value: '0.05'
      - key: NX_ADD_PLUGINS
        value: 'false'
    disk:
      name: uploads
      mountPath: /uploads
      sizeGB: 5
    healthCheckPath: /

  # Optional: Self-hosted Temporal Server (advanced)
  # If you prefer not to use Temporal Cloud, uncomment the services below.
  # Note: This requires at least a Standard plan for sufficient memory.
  #
  # - type: pserv
  #   name: temporal-postgres
  #   runtime: docker
  #   image:
 #     url: postgres:16
  #   envVars:
